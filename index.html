<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <title>智御 (Zhiyu) | 高中三年数字化成长伙伴 - 166 基地智慧教育枢纽</title>
    <style>
        :root {
            --blue: #3498db; --navy: #050a16; --gold: #f1c40f; 
            --glass: rgba(13, 25, 48, 0.98); --green: #10b981; --text: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; scroll-behavior: smooth; }
        body { background-color: var(--navy); color: var(--text); font-family: "PingFang SC", "Microsoft YaHei", sans-serif; line-height: 1.6; }

        /* 全局背景 */
        .master-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, #1a2a4a 0%, #050a16 100%); }
        .grid-tech { position: absolute; inset: 0; background-image: linear-gradient(rgba(52,152,219,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(52,152,219,0.05) 1px, transparent 1px); background-size: 60px 60px; }

        /* 导航 */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 60px; background: rgba(5, 10, 22, 0.95); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(52, 152, 219, 0.3); position: sticky; top: 0; z-index: 1000; }
        .logo-box { display: flex; align-items: center; gap: 12px; }
        .logo-circle { width: 40px; height: 40px; background: var(--blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 0 20px var(--blue); }
        .nav-links { display: flex; gap: 30px; font-size: 14px; }
        .nav-links a { color: #94a3b8; text-decoration: none; transition: 0.3s; }
        .nav-links a:hover { color: var(--blue); }

        /* 品牌核心 */
        header { height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        header h1 { font-size: 64px; font-weight: 900; background: linear-gradient(to bottom, #fff, var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -2px; }
        header p { font-size: 22px; color: #94a3b8; margin-top: 20px; letter-spacing: 6px; }

        /* 演示实验室 */
        section { padding: 100px 60px; max-width: 1300px; margin: 0 auto; }
        .lab-box { background: #000; border: 1px solid #1e293b; border-radius: 35px; padding: 45px; min-height: 600px; position: relative; overflow: hidden; box-shadow: 0 40px 100px rgba(0,0,0,0.8); }
        .btn-main { background: var(--blue); color: #fff; border: none; padding: 18px 50px; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 10px 25px rgba(52,152,219,0.4); transition: 0.3s; }
        .btn-main:hover { transform: scale(1.05); filter: brightness(1.1); }

        .logs { font-family: 'Consolas', monospace; font-size: 14px; color: var(--green); margin-bottom: 30px; height: 110px; line-height: 1.8; }
        
        /* 增强版五维报告 */
        .zhiyu-report { display: none; background: var(--glass); border: 1px solid var(--gold); border-radius: 25px; padding: 45px; animation: slideUp 0.8s forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }

        .report-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-top: 30px; }
        .dim-card { background: rgba(255,255,255,0.03); border-radius: 18px; padding: 25px; border-left: 5px solid var(--blue); }
        .dim-card h4 { color: var(--blue); margin-bottom: 12px; font-size: 17px; }
        .dim-card p { font-size: 14px; color: #cbd5e1; line-height: 1.8; }

        /* 申请功能交互 */
        .apply-zone { background: rgba(52,152,219,0.05); border: 1px solid rgba(52,152,219,0.1); border-radius: 45px; padding: 100px 60px; text-align: center; margin-top: 50px; }
        .apply-form { display: flex; flex-direction: column; align-items: center; gap: 25px; margin-top: 40px; }
        .input-box { background: rgba(0,0,0,0.4); border: 1px solid #334155; padding: 18px 30px; border-radius: 15px; color: #fff; width: 450px; outline: none; transition: 0.4s; font-size: 16px; }
        .input-box:focus { border-color: var(--blue); box-shadow: 0 0 20px rgba(52,152,219,0.2); }
        .success-box { display: none; padding: 35px; border-radius: 20px; background: rgba(16, 185, 129, 0.1); border: 1px solid var(--green); color: var(--green); animation: slideUp 0.5s forwards; }

        footer { text-align: center; padding: 80px; color: #475569; font-size: 12px; letter-spacing: 3px; text-transform: uppercase; }
    </style>
</head>
